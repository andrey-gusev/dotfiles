source = ~/.cache/wal/hyprland-colors.conf
monitor=DP-1,1920x1080@143.98,auto,1
monitor=HDMI-A-1,disable
monitor=,preferred,auto,1

$terminal = foot
$fileManager = lf
$menu = rofi -show drun
$emojimenu = rofi -show emoji
$browser = librewolf
$editor = nvim

exec-once = foot --server
exec-once = waybar
# exec-once = hyprpaper
exec-once = awww-daemon
exec-once = hypridle
exec-once = hyprsunset
exec-once = mako
exec-once = setbg
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia  

general {
    gaps_in = 5
    gaps_out = 10,20
    border_size = 3
    col.active_border = $color1
    col.inactive_border = rgba(0,0,0,0)
    resize_on_border = false
    allow_tearing = true
    layout = dwindle
    snap {
        enabled = true
        window_gap = 15
        monitor_gap = 15
    }
}

xwayland {
    enabled = false
}

decoration {
    rounding = 0
    rounding_power = 2
    fullscreen_opacity = 1
    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = $color2
    }

    blur {
        enabled = false
        size = 8
        passes = 2
        # vibrancy = 0.1696
    }
}

animations {
    enabled = true
    bezier = appleEase, 0.25, 1, 0.5, 1
    bezier = appleClose, 0.5, 0, 0.75, 0.25
    animation = global, 1, 3.8, appleEase
    animation = windows, 1, 3.5, appleEase, popin 80%
    animation = windowsIn, 1, 3.2, appleEase, popin 80%
    animation = windowsOut, 1, 2.8, appleClose, popin 82%
    animation = layers, 1, 3, appleEase, fade
    animation = workspaces, 1, 4, appleEase, slide
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    enable_swallow = true
    swallow_regex = ^($terminal)$
    background_color = rgb(0, 0, 0)
}

cursor {
    inactive_timeout = 1
    no_warps = true
    hide_on_key_press = true
}

input {
    kb_layout = us,ru
    # сейчас используется keyd
    # kb_options = grp:ctrl_shift_toggle, caps:escape
    kb_options = caps:escape
    follow_mouse = 1
    sensitivity = 0
    repeat_rate = 50
    repeat_delay = 300
    touchpad {
        natural_scroll = false
        scroll_factor = 0.5
    }
}

scrolling {
    follow_focus = true
    focus_fit_method = 1
    # follow_min_visible = 0.0
}

$mainMod = SUPER

bindl = , F24, exec, hyprctl switchxkblayout all next

binde = $mainMod, return, exec, $terminal
binde = $mainMod, Q, killactive,
bind = $mainMod SHIFT, C, exit,
bind = $mainMod, R, exec, $terminal -e $fileManager
bind = $mainMod SHIFT, SPACE, togglefloating,
bind = $mainMod SHIFT, SPACE, centerwindow,
bind = $mainMod, SPACE, layoutmsg, swapwithmaster master
bind = $mainMod, D, exec, $menu
bind = $mainMod, GRAVE, exec, $emojimenu
bind = $mainMod, W, exec, $browser
bind = $mainMod, T, exec, Telegram
bind = $mainMod, M, exec, yandex-music
bind = $mainMod, B, exec, pkill -SIGUSR1 waybar
bind = $mainMod SHIFT, B, exec, setbg
bind = $mainMod SHIFT, R, exec, $terminal btop
bind = ALT, A, exec, hyprctl --batch "keyword general:gaps_in 0 ; keyword general:gaps_out 0"
bind = ALT SHIFT, A, exec, hyprctl --batch "keyword general:gaps_in 5 ; keyword general:gaps_out 10"
binde = ALT, X, exec, gaps --inc_gaps_out
binde = ALT, Z, exec, gaps --dec_gaps_out
bind = $mainMod SHIFT, A, exec, hyprctl keyword animations:enabled $(hyprctl getoption animations:enabled | grep -q "int: 1" && echo "0" || echo "1")
bind = $mainMod SHIFT, BACKSPACE, exec, hyprlock
bind = $mainMod, F3, exec, displayselect
bind = $mainMod, F4, exec, $terminal -e pulsemixer
bind = $mainMod SHIFT, W, exec, $terminal -e nmtui
bind = $mainMod, F12, exec, sh -c 'mpv av://v4l2:$(ls /dev/video* | head -n 1) --title=cam --profile=low-latency --untimed --no-cache --no-osc --no-input-default-bindings --input-conf=/dev/null'
bind = $mainMod, BACKSPACE, exec, pwr
bind = $mainMod SHIFT, X, exec, pwr
bind = , Print, exec, hyprshot -m output -m active --clipboard-only
bind = SHIFT, Print, exec, hyprshot -m region --clipboard-only
bind = ALT, Print, exec, hyprshot -m window -m active --clipboard-only
bind = $mainMod SHIFT, S, exec, hyprshot --raw -m region | tesseract stdin stdout -l rus+eng | wl-copy
bind = $mainMod, Print, exec, record
bind = SUPER, V, exec, cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy

binde = $mainMod, h, movefocus, l
binde = $mainMod, l, movefocus, r
binde = $mainMod, k, movefocus, u
binde = $mainMod, j, movefocus, d

binde = $mainMod SHIFT, h, resizeactive,-50 0
binde = $mainMod SHIFT, j, resizeactive,0 50
binde = $mainMod SHIFT, k, resizeactive,0 -50
binde = $mainMod SHIFT, l, resizeactive,50 0

bind = $mainMod, F, fullscreen
bind = $mainMod, S, pin
bind = $mainMod, TAB, cyclenext
bind = ALT, TAB, workspace, previous

binde = $mainMod CTRL, h, movewindow,l
binde = $mainMod CTRL, j, movewindow,d
binde = $mainMod CTRL, k, movewindow,u
binde = $mainMod CTRL, l, movewindow,r

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = $mainMod, Escape, submap, passthru
submap = passthru
bind = $mainMod, Escape, submap, reset
submap = reset

windowrule {
  name = windowrule-2
  tile = on
  match:class = ^(Nsxiv)$
}

windowrule {
  name = windowrule-2
  tile = on
  match:class = ^(FreeRDP)$
}

# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
windowrule = border_size 0, match:float 0, match:workspace w[tv1]
windowrule = rounding 0, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, match:float 0, match:workspace f[1]
windowrule = rounding 0, match:float 0, match:workspace f[1]
