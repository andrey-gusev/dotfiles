[ids]
*

[main]
# Секцию оставляем пустой. keyd по умолчанию сам мапит Ctrl и Shift на их слои.

[control]
# Когда зажат Ctrl, клавиша Shift при одиночном клике выдаст F24, 
# а при удержании с другими клавишами (например, стрелками) сработает как обычный Shift.
leftshift = overload(shift, f24)
rightshift = overload(shift, f24)

[shift]
# То же самое для обратного порядка (сначала Shift, потом Ctrl)
leftcontrol = overload(control, f24)
rightcontrol = overload(control, f24)
